<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ติดตามพัสดุ — SiamHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d26;--card:#21253a;
  --blue:#4f8ef7;--blue-dim:#1e3a6e;
  --green:#2ecc71;--green-dim:#1a4a30;
  --orange:#f39c12;--orange-dim:#4a3010;
  --red:#e74c3c;--red-dim:#4a1a1a;
  --gray:#8892a4;--gray-dim:#2a2d3a;
  --text:#eef0f6;--text2:#8892a4;--text3:#4a5060;
  --border:#2a2d3a;--radius:16px;
  --flash:#ff4500;
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}

/* Header */
.hdr{
  background:linear-gradient(135deg,#1a1d26 0%,#21253a 100%);
  border-bottom:1px solid var(--border);
  padding:16px 20px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(10px);
}
.hdr-icon{
  width:40px;height:40px;
  background:linear-gradient(135deg,#4f8ef7,#2563eb);
  border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:20px;
  box-shadow:0 4px 15px rgba(79,142,247,.3);
}
.hdr-t{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hdr-s{font-size:11px;color:var(--text2);margin-top:1px}

/* Search */
.srch{padding:16px 20px 12px;background:var(--surface);border-bottom:1px solid var(--border)}
.srch-row{display:flex;gap:10px}
.srch-row input{
  flex:1;border:1.5px solid var(--border);border-radius:28px;
  padding:13px 20px;font-size:16px;font-family:'Sarabun',sans-serif;
  outline:none;color:var(--text);background:var(--card);
  transition:border-color .2s,box-shadow .2s;
}
.srch-row input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,142,247,.15)}
.srch-row input::placeholder{color:var(--text3)}
.btn-go{
  background:linear-gradient(135deg,#4f8ef7,#2563eb);color:#fff;
  border:none;border-radius:28px;padding:13px 22px;
  font-size:16px;font-family:'Sarabun',sans-serif;
  cursor:pointer;font-weight:600;white-space:nowrap;
  box-shadow:0 4px 15px rgba(79,142,247,.3);
  transition:opacity .15s,transform .1s;
}
.btn-go:active{opacity:.85;transform:scale(.97)}
.srch-hint{font-size:12px;color:var(--text3);margin-top:8px;padding:0 4px}

/* Body */
.body{padding:16px 20px}

/* State */
.state{text-align:center;padding:60px 20px;color:var(--text2)}
.state .ico{font-size:52px;margin-bottom:14px;opacity:.7}
.state p{font-size:14px;line-height:1.8}

/* Main Card */
.card{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);margin-bottom:12px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Status Banner */
.status-banner{
  padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.sb-wait  {background:linear-gradient(135deg,#4a3010,#3a2008);border-bottom:1px solid #f39c1233}
.sb-transit{background:linear-gradient(135deg,#1e3a6e,#0f2040);border-bottom:1px solid #4f8ef733}
.sb-done  {background:linear-gradient(135deg,#1a4a30,#0f2a1a);border-bottom:1px solid #2ecc7133}
.sb-return{background:linear-gradient(135deg,#4a1a1a,#2a0f0f);border-bottom:1px solid #e74c3c33}
.sb-cancel{background:linear-gradient(135deg,#2a2d3a,#1a1d26);border-bottom:1px solid var(--border)}

.status-icon{font-size:28px}
.status-label{font-size:15px;font-weight:700;flex:1}
.status-sub{font-size:11px;opacity:.7;margin-top:2px}
.sw{color:var(--orange)}.st{color:var(--blue)}.sd{color:var(--green)}.sr{color:var(--red)}.sc{color:var(--gray)}

/* Info */
.card-info{padding:14px 18px}
.recipient{font-size:19px;font-weight:700;margin-bottom:4px}
.phone-row{font-size:13px;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Tracking */
.track-box{
  background:var(--surface);border-radius:10px;
  padding:12px 14px;
  display:flex;align-items:center;gap:10px;
  border:1px solid var(--border);
  margin-bottom:10px;
}
.track-num{
  font-family:'IBM Plex Mono',monospace;
  font-size:15px;font-weight:500;flex:1;
  color:var(--text);letter-spacing:.5px;word-break:break-all;
}
.btn-copy-trk{
  background:var(--blue-dim);border:1px solid var(--blue);
  color:var(--blue);border-radius:8px;padding:6px 12px;
  font-size:12px;cursor:pointer;font-family:'Sarabun',sans-serif;
  font-weight:600;white-space:nowrap;transition:all .15s;
}
.btn-copy-trk.ok{background:var(--green-dim);border-color:var(--green);color:var(--green)}

/* Meta rows */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.meta-item{background:var(--surface);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.meta-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.meta-val{font-size:14px;font-weight:600;color:var(--text)}
.meta-val.cod{color:var(--orange)}
.meta-full{grid-column:1/-1}

/* Status Card (visual สำหรับ screenshot) */
.status-card{
  margin:0 18px 14px;
  border-radius:12px;
  background:linear-gradient(135deg,#1a1d26,#21253a);
  border:1px solid var(--border);
  padding:14px 16px;
  display:none;
}
.status-card.show{display:block}
.sc-header{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.sc-timeline{display:flex;flex-direction:column;gap:0}
.sc-step{display:flex;gap:12px;position:relative}
.sc-step:not(:last-child) .sc-line{position:absolute;left:10px;top:22px;width:2px;height:calc(100% + 4px);background:var(--border)}
.sc-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:var(--surface);flex-shrink:0;margin-top:2px;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;font-size:10px}
.sc-dot.active{border-color:var(--green);background:var(--green);color:#fff}
.sc-dot.done{border-color:var(--blue);background:var(--blue-dim);color:var(--blue)}
.sc-text{padding-bottom:14px;flex:1}
.sc-name{font-size:13px;font-weight:600;color:var(--text)}
.sc-name.dim{color:var(--text3);font-weight:400}
.sc-time{font-size:11px;color:var(--text3);margin-top:2px}
.sc-hub{font-size:11px;color:var(--blue);margin-top:2px}

/* Actions */
.card-actions{padding:12px 18px;display:flex;gap:8px;border-top:1px solid var(--border);flex-wrap:wrap}
.ba{
  flex:1;min-width:90px;padding:11px 8px;border-radius:10px;
  font-size:13px;cursor:pointer;font-family:'Sarabun',sans-serif;
  font-weight:600;display:flex;align-items:center;justify-content:center;
  gap:5px;border:none;transition:opacity .15s,transform .1s;
}
.ba:active{opacity:.8;transform:scale(.97)}
.ba-msg{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue);}
.ba-courier{background:var(--orange-dim);color:var(--orange);border:1px solid var(--orange);}
.ba-save{background:var(--green-dim);color:var(--green);border:1px solid var(--green);}
.ba-iship{background:var(--gray-dim);color:var(--gray);border:1px solid var(--border);}

/* Screenshot target */
#screenshot-target{
  position:fixed;left:-9999px;top:0;width:390px;
  background:var(--card);padding:20px;
  font-family:'Sarabun',sans-serif;
}
.ss-header{background:var(--surface);border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;border:1px solid var(--border)}
.ss-badge{padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700}
.ss-name{font-size:20px;font-weight:700;margin-bottom:4px}
.ss-phone{font-size:13px;color:var(--text2);margin-bottom:12px}
.ss-track{background:var(--surface);border-radius:8px;padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:14px;margin-bottom:12px;border:1px solid var(--border)}
.ss-meta{display:flex;gap:8px;margin-bottom:12px}
.ss-meta-item{flex:1;background:var(--surface);border-radius:8px;padding:8px 10px;border:1px solid var(--border)}
.ss-meta-label{font-size:10px;color:var(--text3);margin-bottom:2px}
.ss-meta-val{font-size:14px;font-weight:600}
.ss-footer{font-size:10px;color:var(--text3);text-align:center;margin-top:10px}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#eef0f6;color:#0f1117;padding:10px 22px;border-radius:24px;font-size:14px;font-family:'Sarabun',sans-serif;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.on{opacity:1}

/* Loading */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}

/* Result count */
.ri{font-size:12px;color:var(--text3);margin-bottom:10px;letter-spacing:.3px;text-transform:uppercase}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">📦</div>
  <div>
    <div class="hdr-t">ติดตามพัสดุ</div>
    <div class="hdr-s">Order Tracking — by SiamHub</div>
  </div>
</div>

<div class="srch">
  <div class="srch-row">
    <input type="text" id="q" placeholder="Tracking / เบอร์ / ชื่อ / Order#..." autocomplete="off" />
    <button class="btn-go" onclick="doSearch()">ค้นหา</button>
  </div>
  <div class="srch-hint">🔍 พิมพ์อะไรก็ได้ — ระบบตรวจจับอัตโนมัติ</div>
</div>

<div class="body">
  <div id="result">
    <div class="state">
      <div class="ico">📦</div>
      <p>พิมพ์ข้อมูลเพื่อค้นหาออเดอร์<br><span style="opacity:.6;font-size:13px">Tracking · เบอร์โทร · ชื่อ · Order#</span></p>
    </div>
  </div>
</div>

<!-- Hidden screenshot div -->
<div id="screenshot-target"></div>
<div class="toast" id="toast"></div>

<script>
const APPS_URL = 'https://script.google.com/macros/s/AKfycbzWfhhs7wlVxci2mGQ9BU_c02tetJl972OstUb0M4KGztbuywBht-anu8fWb0vYqReT/exec';
const PROXY = 'https://iship.piriyaro.workers.dev';
const TOKEN = 's70HLccjLD9TdZuOThlzBqKLVyZR3J6ic1Mo6TMCaKF6OA6r5sjhqpcpzGD9UypfReXcdudIyiRiy9upGwNYKrpaEJijo8s4ZVWY';

// Courier tracking URLs — เพิ่ม courier ใหม่ได้ที่นี่
const COURIER_URL = {
  'flashexpress': t => `https://www.flashexpress.co.th/tracking/?se=${t}`,
  'flash':        t => `https://www.flashexpress.co.th/tracking/?se=${t}`,
  'jt':           t => `https://www.jtexpress.co.th/index/query/guesttrack.html?bills=${t}`,
  'j&t':          t => `https://www.jtexpress.co.th/index/query/guesttrack.html?bills=${t}`,
  'kerry':        t => `https://th.kerryexpress.com/th/track/?track=${t}`,
  'thp':          t => `https://track.thailandpost.co.th/?trackNumber=${t}`,
  'scg':          t => `https://www.scgexpress.co.th/tracking/${t}`,
  'best':         t => `https://www.best-inc.co.th/track/${t}`,
};

function getCourierUrl(courierCode, tracking) {
  const key = (courierCode || '').toLowerCase().replace(/[^a-z0-9]/g,'');
  for (const [k, fn] of Object.entries(COURIER_URL)) {
    if (key.includes(k.replace(/[^a-z0-9]/g,''))) return fn(tracking);
  }
  // fallback: 17track
  return `https://t.17track.net/en#nums=${tracking}`;
}

function detectType(q) {
  const c = q.replace(/\s/g,'');
  if(/^TH[A-Z0-9]{8,}$/i.test(c)) return 'tracking';
  if(/^\d{8,10}$/.test(c)) return 'phone';
  if(/^#?\d{3,7}$/.test(c)) return 'order';
  return 'name';
}

function stInfo(ishipStatus, desc, bsStatus) {
  const n = Number(ishipStatus);
  if(n===1) return {icon:'⏳',label:'รอเข้ารับพัสดุ',cls:'sw',banner:'sb-wait'};
  if(n===2) return {icon:'✅',label:'รับพัสดุแล้ว',cls:'st',banner:'sb-transit'};
  if(n===3) return {icon:'🚚',label:'ระหว่างขนส่ง',cls:'st',banner:'sb-transit'};
  if(n===4) return {icon:'🎉',label:'จัดส่งสำเร็จ',cls:'sd',banner:'sb-done'};
  if(n===5) return {icon:'💰',label:'ชำระเงินสำเร็จ',cls:'sd',banner:'sb-done'};
  if(n===6) return {icon:'↩️',label:'ตีกลับ/คืนสินค้า',cls:'sr',banner:'sb-return'};
  if(n===7) return {icon:'❌',label:'ยกเลิก',cls:'sc',banner:'sb-cancel'};
  // fallback จาก desc หรือ BigSeller
  const s = (desc || bsStatus || '').toLowerCase();
  if(s.includes('สำเร็จ')||s.includes('delivered')) return {icon:'🎉',label:desc||bsStatus,cls:'sd',banner:'sb-done'};
  if(s.includes('ระหว่าง')||s.includes('transit')||s.includes('จัดส่งแล้ว')) return {icon:'🚚',label:desc||bsStatus,cls:'st',banner:'sb-transit'};
  if(s.includes('ตีกลับ')||s.includes('return')) return {icon:'↩️',label:desc||bsStatus,cls:'sr',banner:'sb-return'};
  if(s.includes('ยกเลิก')||s.includes('cancel')) return {icon:'❌',label:desc||bsStatus,cls:'sc',banner:'sb-cancel'};
  if(s.includes('รอ')||s.includes('wait')||s.includes('new')) return {icon:'⏳',label:desc||bsStatus,cls:'sw',banner:'sb-wait'};
  return {icon:'📦',label:desc||bsStatus||'กำลังดำเนินการ',cls:'st',banner:'sb-transit'};
}

function fCOD(v){
  const n = Number(v);
  return (!v||isNaN(n)||n===0) ? null : n.toLocaleString('th-TH',{minimumFractionDigits:2})+' ฿';
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2500);
}

function copyTrack(uid,tr){
  navigator.clipboard.writeText(tr).then(()=>{
    const b=document.getElementById('bt-'+uid);
    b.textContent='✅ แล้ว';b.classList.add('ok');
    setTimeout(()=>{b.textContent='คัดลอก';b.classList.remove('ok');},2000);
  });
}

let cache={};

function copyMsg(i){
  const o=cache[i];if(!o)return;
  const st=stInfo(o.status_iship,o.status_desc,o.status_bigseller);
  const cod=fCOD(o.cod_amount);
  const tr=o.tracking||'';
  const courierUrl=getCourierUrl(o.courier_code,tr);
  const lines=[
    '📦 สถานะพัสดุ',
    `👤 ${o.dst_name||'-'}`,
    `${st.icon} ${st.label}`,
    `🔢 Tracking: ${tr}`,
    cod?`💰 COD: ${cod}`:'',
    `🔗 ${courierUrl}`,
  ].filter(Boolean);
  navigator.clipboard.writeText(lines.join('\n')).then(()=>toast('✅ คัดลอกข้อความแล้ว'));
}

function openCourier(i){
  const o=cache[i];if(!o||!o.tracking)return;
  window.open(getCourierUrl(o.courier_code,o.tracking),'_blank');
}

async function saveAsImage(i){
  const o=cache[i];if(!o)return;
  const st=stInfo(o.status_iship,o.status_desc,o.status_bigseller);
  const cod=fCOD(o.cod_amount);
  const tr=o.tracking||'';
  const now=new Date().toLocaleString('th-TH',{timeZone:'Asia/Bangkok'});

  const target=document.getElementById('screenshot-target');
  target.innerHTML=`
  <div style="background:#21253a;border-radius:16px;padding:20px;color:#eef0f6;font-family:'Sarabun',sans-serif;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;background:#1a1d26;border-radius:10px;padding:12px 14px;border:1px solid #2a2d3a">
      <span style="font-size:28px">${st.icon}</span>
      <div>
        <div style="font-size:16px;font-weight:700;color:${st.cls==='sd'?'#2ecc71':st.cls==='st'?'#4f8ef7':st.cls==='sw'?'#f39c12':st.cls==='sr'?'#e74c3c':'#8892a4'}">${st.label}</div>
        <div style="font-size:11px;color:#8892a4;margin-top:2px">สถานะพัสดุ</div>
      </div>
    </div>
    <div style="font-size:20px;font-weight:700;margin-bottom:3px">${o.dst_name||'-'}</div>
    <div style="font-size:13px;color:#8892a4;margin-bottom:12px">📱 ${o.dst_phone||'-'}</div>
    <div style="background:#1a1d26;border-radius:8px;padding:10px 12px;font-family:'IBM Plex Mono',monospace;font-size:13px;margin-bottom:12px;border:1px solid #2a2d3a;letter-spacing:.5px">${tr}</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      ${o.platform_order_id||o.order_id?`<div style="flex:1;background:#1a1d26;border-radius:8px;padding:8px 10px;border:1px solid #2a2d3a"><div style="font-size:10px;color:#4a5060;text-transform:uppercase;margin-bottom:2px">Order#</div><div style="font-size:13px;font-weight:600">${o.platform_order_id||o.order_id}</div></div>`:''}
      ${cod?`<div style="flex:1;background:#1a1d26;border-radius:8px;padding:8px 10px;border:1px solid #2a2d3a"><div style="font-size:10px;color:#4a5060;text-transform:uppercase;margin-bottom:2px">COD</div><div style="font-size:13px;font-weight:600;color:#f39c12">${cod}</div></div>`:''}
      <div style="flex:1;background:#1a1d26;border-radius:8px;padding:8px 10px;border:1px solid #2a2d3a"><div style="font-size:10px;color:#4a5060;text-transform:uppercase;margin-bottom:2px">ขนส่ง</div><div style="font-size:13px;font-weight:600">${o.courier_code||'-'}</div></div>
    </div>
    <div style="font-size:10px;color:#4a5060;text-align:center;border-top:1px solid #2a2d3a;padding-top:10px">SiamHub Order Tracker · ${now}</div>
  </div>`;

  target.style.left='0';target.style.top='0';target.style.position='absolute';target.style.zIndex='-1';

  try{
    const canvas=await html2canvas(target,{backgroundColor:null,scale:2,logging:false,useCORS:true});
    target.style.left='-9999px';target.style.position='fixed';

    canvas.toBlob(async blob=>{
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],'status.png',{type:'image/png'})]})){
        const file=new File([blob],'status.png',{type:'image/png'});
        await navigator.share({files:[file],title:'สถานะพัสดุ'});
      } else {
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download=`status_${tr}.png`;
        a.click();
        toast('✅ บันทึกภาพแล้ว');
      }
    },'image/png');
  }catch(e){
    target.style.left='-9999px';target.style.position='fixed';
    toast('❌ บันทึกภาพไม่ได้: '+e.message);
  }
}

function buildCard(o,i){
  const st=stInfo(o.status_iship,o.status_desc,o.status_bigseller);
  const tr=o.tracking||'';
  const cod=fCOD(o.cod_amount);
  const uid='c'+i;
  const orderNum=o.platform_order_id||o.order_id||'';
  const courierLabel=(o.courier_code||'').includes('Flash')||((o.courier_code||'').includes('flash'))?'Flash Express':o.courier_code||'ขนส่ง';

  return `<div class="card">
  <div class="status-banner ${st.banner}">
    <span class="status-icon">${st.icon}</span>
    <div style="flex:1">
      <div class="status-label ${st.cls}">${st.label}</div>
      <div class="status-sub">${o.courier_code||''}</div>
    </div>
  </div>
  <div class="card-info">
    <div class="recipient">${o.dst_name||'-'}</div>
    <div class="phone-row">📱 ${o.dst_phone||'-'}</div>
    ${tr?`<div class="track-box"><span class="track-num">${tr}</span><button class="btn-copy-trk" id="bt-${uid}" onclick="copyTrack('${uid}','${tr}')">คัดลอก</button></div>`:''}
    <div class="meta-grid">
      ${orderNum?`<div class="meta-item"><div class="meta-label">Order#</div><div class="meta-val">${orderNum}</div></div>`:''}
      ${cod?`<div class="meta-item"><div class="meta-label">COD</div><div class="meta-val cod">${cod}</div></div>`:''}
      ${o.updated_at?`<div class="meta-item meta-full"><div class="meta-label">อัปเดต</div><div class="meta-val" style="font-size:12px;font-weight:400;color:var(--text2)">${o.updated_at}</div></div>`:''}
    </div>
  </div>
  <div class="card-actions">
    <button class="ba ba-msg" onclick="copyMsg(${i})">📋 คัดลอกข้อความ</button>
    ${tr?`<button class="ba ba-courier" onclick="openCourier(${i})">🚚 เช็คขนส่ง</button>`:''}
    <button class="ba ba-save" onclick="saveAsImage(${i})">📸 บันทึกภาพ</button>
    ${tr?`<button class="ba ba-iship" onclick="window.open('https://app.iship.cloud/detail/${tr}','_blank')">📄 iShip</button>`:''}
  </div>
</div>`;
}

async function doSearch(){
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  cache={};
  const area=document.getElementById('result');
  area.innerHTML=`<div class="state"><div class="spin"></div><p>กำลังค้นหา...</p></div>`;
  const type=detectType(q);

  try{
    let orders=[];

    if(type==='tracking'){
      // ค้นจาก Sheet ก่อน
      try{
        const r=await fetch(APPS_URL+'?q='+encodeURIComponent(q));
        const j=await r.json();
        if(j.status==='ok'&&j.count>0) orders=j.data;
      }catch(e){}

      // ถ้าไม่เจอใน Sheet ดึงจาก iShip API โดยตรง
      if(!orders.length){
        const res=await fetch(`${PROXY}/get_order/${encodeURIComponent(q)}`,{
          headers:{'Authorization':'Bearer '+TOKEN,'Accept':'application/json'}
        });
        if(res.ok){
          const j=await res.json();
          if(j.status&&j.data){
            orders=[{
              tracking:j.data.track_no,
              order_id:j.data.custom_order_id||'',
              platform_order_id:'',
              status_iship:String(j.data.status||''),
              status_desc:j.data.status_name||'',
              status_bigseller:'',
              courier_code:j.data.courier_code||'',
              dst_name:j.data.dst_name||'',
              dst_phone:j.data.dst_phone||'',
              cod_amount:j.data.cod_amount||'',
              updated_at:j.data.updated||'',
            }];
          }
        }
      }
    } else {
      const r=await fetch(APPS_URL+'?q='+encodeURIComponent(q));
      const j=await r.json();
      if(j.status==='ok') orders=j.data;
    }

    if(!orders.length){
      area.innerHTML=`<div class="state"><div class="ico">📭</div><p>ไม่พบออเดอร์ที่ตรงกัน<br><span style="font-size:12px;opacity:.5">ลองค้นด้วยข้อมูลอื่น</span></p></div>`;
      return;
    }
    orders.forEach((o,i)=>cache[i]=o);
    area.innerHTML=`<div class="ri">พบ ${orders.length} รายการ</div>`+orders.map((o,i)=>buildCard(o,i)).join('');
  }catch(e){
    area.innerHTML=`<div class="state"><div class="ico">⚠️</div><p style="color:#e74c3c"><b>เกิดข้อผิดพลาด</b><br>${e.message}</p></div>`;
  }
}

window.onload=()=>{
  const t=new URLSearchParams(location.search).get('t');
  if(t){document.getElementById('q').value=t;doSearch();}
};
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
</script>
</body>
